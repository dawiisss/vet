# pnpm v11 Configuration
# Settings moved from package.json since pnpm v11 no longer reads configuration from package.json manifest.

allowBuilds:
  node-pty: true
  cpu-features: true
  ssh2: true
  esbuild: true
  electron-winstaller: true
  unrs-resolver: true
  cpu-features@file:stubs/cpu-features-0.0.10.tgz: true

overrides:
  nan: "^2.22.0"
  esbuild: "^0.28.1"
  cpu-features: "file:./stubs/cpu-features-0.0.10.tgz"
  js-yaml: "^4.2.0"
  form-data: "^4.0.6"
  undici: "^7.28.0"
