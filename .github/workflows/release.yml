name: Release

on:
  push:
    tags: [v*]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies (Linux)
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y python3 make gcc g++

      - name: Install npm dependencies
        run: npm ci

      - name: Type check & Test
        run: |
          npm run typecheck
          npm run test

      - name: Build & Package
        run: npm run dist:${{ matrix.target }} -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vet-${{ matrix.target }}
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/*.tar.gz
            dist/*.exe
            dist/*.zip
            dist/*.blockmap

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: vet-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/*.tar.gz
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
