name: Feature Request
description: Propose a new feature or enhancement for Vet
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Vet better? We'd love to hear it!
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of the problem you are experiencing (e.g., "I'm always frustrated when...").
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the Solution You'd Like
      description: A clear and concise description of the feature or enhancement you're proposing.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives You've Considered
      description: Describe any workarounds or alternative designs you have considered.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, mockup drawings, or screenshots to illustrate the feature.
