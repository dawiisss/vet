name: Bug Report
description: File a bug report to help us improve Vet
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this bug. Please provide as much detail as possible to help us diagnose and fix the issue.
  - type: input
    id: version
    attributes:
      label: Vet Version
      description: Which version of Vet are you running? (e.g., v1.0.1)
      placeholder: e.g., v1.0.1
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System & Version
      description: Specify your OS and desktop environment.
      placeholder: e.g., Ubuntu 24.04 (GNOME), Arch Linux, Windows 11
    validations:
      required: true
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Describe how to reproduce this bug.
      placeholder: |
        1. Launch Vet
        2. Click on '...'
        3. Run command '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs-screenshots
    attributes:
      label: Screenshots, Logs, or Diagnostics
      description: Drag and drop screenshots or paste log files / console error outputs here.
